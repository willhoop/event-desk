name: Refresh Kalshi prices
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node build-kalshi.js
      - run: |
          git config user.name "kalshi-bot"
          git config user.email "bot@users.noreply.github.com"
          git add kalshi.json
          git diff --staged --quiet || git commit -m "Live Kalshi prices"
          git push
