name: Refresh polls
on:
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: refresh-polls
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build polls.json from the source sheet
        env:
          POLLS_CSV_URL: ${{ vars.POLLS_CSV_URL }}
        run: node build-polls.js
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain polls.json)" ]; then
            git config user.name "polls-bot"
            git config user.email "actions@github.com"
            git add polls.json
            git commit -m "Refresh polls.json"
            git push
          else
            echo "No changes to commit."
          fi
